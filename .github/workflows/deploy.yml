name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.123.7'
          extended: true

      - name: List files (debug)
        run: |
          echo "=== Root ===" && ls -la
          echo "=== Themes ===" && ls -la themes/ || echo "No themes dir"
          echo "=== Theme layouts ===" && ls -la themes/linux-priv-theme/layouts/ || echo "No layouts"

      - name: Build
        run: hugo --minify --baseURL "https://linux-priv.github.io/"

      - name: List public (debug)
        run: |
          echo "=== Public ===" && ls -la public/
          echo "=== index.html size ===" && wc -c public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
